                                    <input type="date" value={newRecordData.visitDate} onChange={e=>setNewRecordData({...newRecordData, visitDate:e.target.value})} className="w-full border rounded p-2 text-xs dark:bg-slate-800 dark:text-white" />
                                    <input type="number" placeholder="金額" value={newRecordData.amount} onChange={e=>setNewRecordData({...newRecordData, amount:e.target.value})} className="w-full border rounded p-2 text-xs dark:bg-slate-800 dark:text-white" />
                                    <input type="text" placeholder="診斷 / 項目" value={newRecordData.diagnosis} onChange={e=>setNewRecordData({...newRecordData, diagnosis:e.target.value})} className="w-full border rounded p-2 text-xs dark:bg-slate-800 dark:text-white" />
                                    <button onClick={handleSaveRecord} className="w-full bg-indigo-600 text-white py-2 rounded text-xs font-bold flex items-center justify-center"><Icon name="plus" size={14} className="mr-1"/> 加入紀錄</button>
                                </div>
                                <button onClick={()=>handleDeleteCase(activeCase.id)} className="w-full mt-6 text-red-500 text-xs py-2 hover:bg-red-50 rounded">刪除此案件</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const BottomNav = ({ currentView, setView }) => (
            <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 px-6 py-2 safe-area-bottom flex justify-between items-center z-40">
                {[
                    {id:'entry', icon:'plus', label:'新增'},
                    {id:'database', icon:'list', label:'列表'},
                    {id:'analytics', icon:'chart', label:'數據'},
                    {id:'claims_dashboard', icon:'activity', label:'索償'}
                ].map(item => (
                    <button key={item.id} onClick={() => setView(item.id)} className={`flex flex-col items-center gap-1 p-2 ${currentView===item.id?'text-indigo-600 dark:text-indigo-400':'text-slate-400'}`}>
                        <Icon name={item.icon} size={24} />
                        <span className="text-[10px] font-bold">{item.label}</span>
                    </button>
                ))}
            </div>
        );

        // --- 3. Main Content ---
        const MainContent = () => {
            const [config, setConfig] = useState(null);
            const [user, setUser] = useState(null);
            const [clients, setClients] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentView, setCurrentView] = useState('database'); 
            const [editingId, setEditingId] = useState(null);
            const [darkMode, setDarkMode] = useState(localStorage.getItem('felix_theme') === 'dark');
            const fileInputRef = useRef(null);
            
            const [claimsModalData, setClaimsModalData] = useState({ isOpen: false, client: null });
            const [claimsFilter, setClaimsFilter] = useState('processing');
            const [claimsSearch, setClaimsSearch] = useState('');
            const [toasts, setToasts] = useState([]);
            const [modalConfig, setModalConfig] = useState({ isOpen: false });
            const [formStep, setFormStep] = useState(1); 
            const [isSubmitReady, setIsSubmitReady] = useState(true);

            const initialFormState = {
                source: '朋友介紹', referrerName: '', name: '', nickname: '', phone: '', 
                residentialArea: '', hobbies: '', occupation: '', income: '', 
                medicalHistory: '', isClient: 'not_yet', appointmentDate: '', clientSinceDate: '', remarks: '',
                birthday: '', policyDetails: {}, policies: { criticalIllness: [], vhis: [], saving: [], accident: [], annuity: [], mpf: [] },
                claims: [] 
            };
            const [formData, setFormData] = useState(initialFormState);
            const [searchTerm, setSearchTerm] = useState('');
            const [activeFilters, setActiveFilters] = useState({ status: 'all', source: 'all', policies: [] });
            const [sortOrder, setSortOrder] = useState('updated_desc');

            const POLICY_OPTIONS = {
                criticalIllness: { label: '1. 危疾', options: ['危疾應援保(升級版)', '危疾應援保', '危疾全守衛（超卓版)', '危疾晉御保(尊尚版)', '危疾緻尚保', '危疾緻尚保(升級版)', '父母之加添守護選項'] },
                vhis: { label: '2. 醫保', options: ['人仁保醫療保險計劃', '易衛您醫療計劃', '倍衛您醫療計劃', '尊衛您（寰譽版）醫療計劃', '醫家保醫療計劃'] },
                saving: { label: '3. Saving Plan', options: ['盈聚‧天下壽險計劃 – 2年供', '盈聚‧天下壽險計劃 – 5年供', '盈聚優裕壽險計劃 - 5年供', '盈聚環球壽險計劃 - 5年供'] },
                accident: { label: '4. 意外保險', options: ['人身意外保險附約', '全意守護意外保障計劃', '全意衛您意外保障計劃'] },
                annuity: { label: '5. 年金', options: ['盈•歲悅延期年金計劃'] },
                mpf: { label: '6. 強積金 (MPF)', options: ['強積金 (MPF)', '整合 MPF 帳戶', '宏利 MPF', '永明 MPF', 'BCT MPF', '信安 MPF', '友邦 MPF'] }
            };
            const INCOME_OPTIONS = ['<15K', '15K-30K', '30K-40K', '40K-50K', '50K+'];
            const CURRENCY_OPTIONS = ['HKD', 'USD', 'RMB'];
            const SOURCE_OPTIONS = ['朋友介紹', 'Bigboss', '自己朋友', '其他'];

            // --- Helper Functions ---
            const calculateAge = (birthday) => {
                if (!birthday) return '';
                const birthDate = new Date(birthday);
                const today = new Date();
                let age = today.getFullYear() - birthDate.getFullYear();
                const m = today.getMonth() - birthDate.getMonth();
                if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
                return age;
            };

            useEffect(() => {
                if(darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('felix_theme', darkMode ? 'dark' : 'light');
            }, [darkMode]);

            useEffect(() => {
                const firebaseConfig = {
                    apiKey: "AIzaSyB0kqzsRUuVckQoBRkSiDcazPEsOkLaKks",
                    authDomain: "felix-client-dara-base.firebaseapp.com",
                    projectId: "felix-client-dara-base",
                    storageBucket: "felix-client-dara-base.firebasestorage.app",
                    messagingSenderId: "883377360806",
                    appId: "1:883377360806:web:27445ad0dbe192d6628967",
                    measurementId: "G-PFQR5TMLDF"
                };
                initializeFirebase(firebaseConfig);
            }, []);

            // --- STATISTICS ---
            const counts = useMemo(() => {
                const stats = { all: clients.length, already: 0, not_yet: 0, criticalIllness: 0, vhis: 0, saving: 0, annuity: 0, accident: 0, mpf: 0, anyPolicy: 0, source: {} };
                SOURCE_OPTIONS.forEach(s => stats.source[s] = 0); stats.source['其他'] = 0;
                clients.forEach(c => {
                    if (c.isClient === 'already') stats.already++; else stats.not_yet++;
                    const s = c.source || '其他'; stats.source[s] !== undefined ? stats.source[s]++ : stats.source['其他']++;
                    if (c.isClient === 'already') {
                        const p = c.policies || {}; let hasAny = false;
                        if ((p.criticalIllness || []).length > 0) { stats.criticalIllness++; hasAny = true; }
                        if ((p.vhis || []).length > 0) { stats.vhis++; hasAny = true; }
                        if ((p.saving || []).length > 0) { stats.saving++; hasAny = true; }
                        if ((p.accident || []).length > 0) { stats.accident++; hasAny = true; }
                        if ((p.annuity || []).length > 0) { stats.annuity++; hasAny = true; }
                        if ((p.mpf || []).length > 0) { stats.mpf++; hasAny = true; }
                        if (hasAny) stats.anyPolicy++;
                    }
                });
                return stats;
            }, [clients]);

            const analyticsData = useMemo(() => {
                const monthlyData = {}; const today = new Date();
                for(let i=5; i>=0; i--) { const d = new Date(today.getFullYear(), today.getMonth() - i, 1); monthlyData[`${d.getMonth()+1}月`] = 0; }
                clients.forEach(c => { if(c.isClient === 'already' && c.clientSinceDate) { const d = new Date(c.clientSinceDate); const k = `${d.getMonth()+1}月`; if(monthlyData.hasOwnProperty(k)) monthlyData[k]++; } });
                const barData = Object.keys(monthlyData).map(k => ({ label: k, value: monthlyData[k] }));
                const pieData = [ 
                    { label: '危疾', value: counts.criticalIllness, color: '#f87171' }, 
                    { label: '醫保', value: counts.vhis, color: '#34d399' }, 
                    { label: '儲蓄', value: counts.saving, color: '#60a5fa' }, 
                    { label: '意外', value: counts.accident, color: '#fbbf24' }, 
                    { label: '年金', value: counts.annuity, color: '#a78bfa' },
                    { label: 'MPF', value: counts.mpf, color: '#f472b6' }
                ];
                const totalClaims = clients.reduce((acc, client) => acc + (client.claims || []).reduce((sum, claim) => sum + ((claim.records||[]).reduce((rSum, r) => rSum + (Number(r.amount)||0), 0)), 0), 0);
                return { barData, pieData, totalClaims };
            }, [clients, counts]);

            const filteredClients = useMemo(() => {
                return clients.filter(c => {
                    const s = searchTerm.toLowerCase();
                    const mSearch = (c.name||'').toLowerCase().includes(s) || (c.phone||'').includes(s) || (c.nickname||'').toLowerCase().includes(s);
                    const mStatus = activeFilters.status === 'all' || c.isClient === activeFilters.status;
                    const mSource = activeFilters.source === 'all' || c.source === activeFilters.source;
                    let mPolicy = true;
                    if(activeFilters.policies.length > 0) {
                        if(c.isClient !== 'already') mPolicy = false;
                        else {
                            const p = c.policies || {};
                            mPolicy = activeFilters.policies.every(type => (p[type] || []).length > 0);
                        }
                    }
                    return mSearch && mStatus && mSource && mPolicy;
                }).sort((a, b) => {
                    if (sortOrder === 'since_desc') { const da = a.clientSinceDate || ''; const db = b.clientSinceDate || ''; return da < db ? 1 : da > db ? -1 : 0; }
                    if (sortOrder === 'since_asc') { const da = a.clientSinceDate || ''; const db = b.clientSinceDate || ''; if (!da) return 1; if (!db) return -1; return da > db ? 1 : da < db ? -1 : 0; }
                    const da = a.updatedAt?.toDate ? a.updatedAt.toDate() : new Date(0); const db = b.updatedAt?.toDate ? b.updatedAt.toDate() : new Date(0);
                    return db - da;
                });
            }, [clients, searchTerm, activeFilters, sortOrder]);

            const allClaims = useMemo(() => clients.flatMap(client => (client.claims || []).map(claim => {
                const totalAmount = (claim.records || []).reduce((acc, curr) => acc + (Number(curr.amount) || 0), 0);
                const claimedAmount = (claim.records || []).filter(r => r.isClaimed).reduce((acc, curr) => acc + (Number(curr.amount) || 0), 0);
                return { 
                    ...claim, 
                    clientName: client.name, 
                    clientId: client.id, 
                    recordsCount: (claim.records || []).length, 
                    totalAmount,
                    claimedAmount
                };
            })).sort((a, b) => new Date(b.incidentDate) - new Date(a.incidentDate)), [clients]);
            
            const filteredDashboardClaims = useMemo(() => allClaims.filter(c => (c.clientName.toLowerCase().includes(claimsSearch.toLowerCase()) || c.title.toLowerCase().includes(claimsSearch.toLowerCase())) && c.status === claimsFilter), [allClaims, claimsSearch, claimsFilter]);

            const addToast = (msg, type = 'success') => { const id = Date.now(); setToasts(prev => [...prev, { id, msg, type }]); setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000); };
            const showConfirm = (title, message, onConfirm, type="danger") => { setModalConfig({ isOpen: true, title, message, onConfirm: () => { onConfirm(); setModalConfig({ isOpen: false }); }, type, onCancel: () => setModalConfig({ isOpen: false }) }); };

            const initializeFirebase = (firebaseConfig) => {
                try {
                    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                    setConfig(firebaseConfig);
                    const auth = firebase.auth();
                    auth.onAuthStateChanged((u) => {
                        if (u) { setUser(u); fetchClients(u); }
                        else { auth.signInAnonymously().catch(e => { addToast("登入失敗", 'error'); setLoading(false); }); }
                    });
                } catch (err) { addToast("系統初始化失敗", 'error'); setLoading(false); }
            };

            const fetchClients = (u) => {
                setLoading(true);
                firebase.firestore().collection('felix_clients').doc('shared_data').collection('data')
                    .onSnapshot(snap => {
                        const list = snap.docs.map(d => {
                            const data = d.data() || {};
                            return {
                                id: d.id, ...data,
                                policies: {
                                    criticalIllness: data.policies?.criticalIllness || [],
                                    vhis: data.policies?.vhis || [],
                                    saving: data.policies?.saving || [],
                                    accident: data.policies?.accident || [],
                                    annuity: data.policies?.annuity || [],
                                    mpf: Array.isArray(data.policies?.mpf) ? data.policies.mpf : (data.policies?.mpf ? ['強積金 (MPF)'] : [])
                                },
                                policyDetails: data.policyDetails || {},
                                claims: Array.isArray(data.claims) ? data.claims : [],
                                birthday: data.birthday || '',
                                clientSinceDate: data.clientSinceDate || '',
                                createdAt: data.createdAt || { toDate: () => new Date() },
                                updatedAt: data.updatedAt || { toDate: () => new Date() }
                            };
                        });
                        setClients(list); setLoading(false);
                    }, err => { addToast("資料同步錯誤", 'error'); setLoading(false); });
            };

            const handleUpdateClient = async (clientId, updateData) => { try { await firebase.firestore().collection('felix_clients').doc('shared_data').collection('data').doc(clientId).update({ ...updateData, updatedAt: new Date() }); addToast("資料已更新"); } catch(e) { addToast("更新失敗", 'error'); } };
            const handleSubmit = async (e) => {
                if (e) e.preventDefault(); 
                if (!user || formStep < 3) return;
                const db = firebase.firestore().collection('felix_clients').doc('shared_data').collection('data');
                let data = { ...formData };
                if (data.source !== '朋友介紹' && data.source !== '其他') data.referrerName = '';
                if (data.isClient === 'not_yet') { data.policies = initialFormState.policies; data.clientSinceDate = ''; data.policyDetails = {}; } else { data.appointmentDate = ''; }
                try {
                    const now = new Date();
                    if (editingId) { await db.doc(editingId).update({ ...data, updatedAt: now }); addToast("資料已更新"); } 
                    else { await db.add({ ...data, createdAt: now, updatedAt: now }); addToast("成功新增客戶"); }
                    handleCancelEdit(); setCurrentView('database');
                } catch (err) { addToast("儲存失敗: " + err.message, 'error'); }
            };

            const handleCancelEdit = () => { setFormData(initialFormState); setEditingId(null); setFormStep(1); };
            const handleEdit = (c) => { setCurrentView('entry'); setFormStep(1); setFormData({ ...initialFormState, ...c }); setEditingId(c.id); };
            const handleDelete = async (id) => showConfirm("刪除確認", "確定要刪除這位客戶的資料嗎？", async () => { await firebase.firestore().collection('felix_clients').doc('shared_data').collection('data').doc(id).delete(); if(editingId === id) handleCancelEdit(); addToast("已刪除資料"); });
            
            const handlePolicyDetailChange = (policyName, field, value) => {
                setFormData(prev => {
                    const currentDetails = prev.policyDetails || {};
                    const policySpecific = currentDetails[policyName] || { premium: '', currency: 'HKD', policyNo: '', effectiveDate: '' };
                    return { ...prev, policyDetails: { ...currentDetails, [policyName]: { ...policySpecific, [field]: value } } };
                });
            };

            // 【優化】加入類別參數 (categoryKey)，讓 MPF 的輸入欄位能顯示客製化提示文字
            const renderPolicyInputs = (policyName, categoryKey) => {
                const details = (formData.policyDetails && formData.policyDetails[policyName]) || {};
                const isMPF = categoryKey === 'mpf';
                return (
                    <div className="policy-detail-box">
                        <input placeholder={isMPF ? "每月供款" : "每期保費"} type="number" value={details.premium || ''} onChange={(e) => handlePolicyDetailChange(policyName, 'premium', e.target.value)} className="w-full border rounded p-1.5 focus:border-indigo-500 outline-none dark:bg-slate-700 dark:text-white dark:border-slate-600" />
                        <select value={details.currency || 'HKD'} onChange={(e) => handlePolicyDetailChange(policyName, 'currency', e.target.value)} className="w-full border rounded p-1.5 bg-white focus:border-indigo-500 outline-none dark:bg-slate-700 dark:text-white dark:border-slate-600">{CURRENCY_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}</select>
                        <input placeholder={isMPF ? "帳戶號碼" : "保單號碼"} value={details.policyNo || ''} onChange={(e) => handlePolicyDetailChange(policyName, 'policyNo', e.target.value)} className="w-full border rounded p-1.5 focus:border-indigo-500 outline-none dark:bg-slate-700 dark:text-white dark:border-slate-600" />
                        <input type="date" title={isMPF ? "生效/整合日期" : "保單生效日期"} value={details.effectiveDate || ''} onChange={(e) => handlePolicyDetailChange(policyName, 'effectiveDate', e.target.value)} className="w-full border rounded p-1.5 focus:border-indigo-500 outline-none dark:bg-slate-700 dark:text-white dark:border-slate-600" />
                    </div>
                );
            };

            const togglePolicyFilter = (policy) => setActiveFilters(prev => {
                if (policy === 'all') return { ...prev, policies: [] };
                const current = prev.policies || [];
                return { ...prev, policies: current.includes(policy) ? current.filter(p => p !== policy) : [...current, policy] };
            });

            const handleQuickStatusToggle = async (e, clientId, claimId, currentStatus) => {
                e.stopPropagation();
                const client = clients.find(c => c.id === clientId);
                if (!client) return;
                const newStatus = currentStatus === 'processing' ? 'completed' : 'processing';
                const updatedClaims = (client.claims || []).map(c => c.id === claimId ? { ...c, status: newStatus } : c);
                await handleUpdateClient(clientId, { claims: updatedClaims });
            };

            const handleQuickDeleteClaim = async (e, clientId, claimId) => {
                e.stopPropagation();
                const client = clients.find(c => c.id === clientId);
                if (!client) return;
                showConfirm("刪除案件", "確定要刪除此索償案件嗎？", async () => {
                    const updatedClaims = (client.claims || []).filter(c => c.id !== claimId);
                    await handleUpdateClient(clientId, { claims: updatedClaims });
                });
            };

            // --- EXCEL IMPORT/EXPORT & AUTO DEDUPLICATION ---
            const parseExcelDate = (val) => { if (!val) return ''; if (typeof val === 'number') { const date = new Date(Math.round((val - 25569) * 86400 * 1000)); return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, '0')}-${String(date.getUTCDate()).padStart(2, '0')}`; } const d = new Date(val); if (!isNaN(d.getTime())) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; } return String(val); };
            
            const handleImport = async (e) => {
                const file = e.target.files[0]; 
                if (!file) return; 
                setLoading(true); 
                const reader = new FileReader();
                
                reader.onload = async (evt) => {
                    try {
                        const data = new Uint8Array(evt.target.result); 
                        const workbook = XLSX.read(data, { type: 'array' }); 
                        const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                        const db = firebase.firestore().collection('felix_clients').doc('shared_data').collection('data'); 
                        const now = new Date(); 
                        
                        const getVal = (row, keys, excludeKeys = []) => {
                            let foundKey = Object.keys(row).find(k => {
                                const cleanK = k.toLowerCase().replace(/[\s\(\)（）\n\r]/g, '');
                                return keys.some(search => cleanK === search.toLowerCase().replace(/[\s\(\)（）]/g, ''));
                            });
                            if (!foundKey) {
                                foundKey = Object.keys(row).find(k => {
                                    const cleanK = k.toLowerCase().replace(/[\s\(\)（）\n\r]/g, '');
                                    const isMatch = keys.some(search => cleanK.includes(search.toLowerCase().replace(/[\s\(\)（）]/g, '')));
                                    const isExcluded = excludeKeys.some(ex => cleanK.includes(ex.toLowerCase().replace(/[\s\(\)（）]/g, '')));
                                    return isMatch && !isExcluded;
                                });
                            }
                            return foundKey !== undefined ? row[foundKey] : '';
                        };
                        
                        let deletedDups = 0;
                        const validClientsMap = new Map(); 
                        
                        const groupedExisting = {};
                        clients.forEach(c => {
                            const key = `${c.name}_${c.phone}`;
                            if (!groupedExisting[key]) groupedExisting[key] = [];
                            groupedExisting[key].push(c);
                        });

                        for (const [key, list] of Object.entries(groupedExisting)) {
                            list.sort((a, b) => (b.updatedAt?.toDate?.() || 0) - (a.updatedAt?.toDate?.() || 0));
                            const mainClient = list[0]; 
                            validClientsMap.set(key, { ...JSON.parse(JSON.stringify(mainClient)), _modified: false, _isNew: false });
                            
                            for (let i = 1; i < list.length; i++) {
                                await db.doc(list[i].id).delete();
                                deletedDups++;
                            }
                        }

                        for (const row of rawData) {
                            const name = getVal(row, ['name', '姓名', '客戶']); 
                            let phone = String(getVal(row, ['phone', 'tel', 'mobile', '電話'])).replace(/\D/g, ''); 
                            if (!name || !phone) continue;
                            
                            const clientKey = `${name}_${phone}`;
                            let clientData = validClientsMap.get(clientKey);
                            
                            if (!clientData) {
                                clientData = {
                                    name, 
                                    phone, 
                                    nickname: getVal(row, ['nickname', '暱稱']) || '', 
                                    birthday: parseExcelDate(getVal(row, ['出生日期', 'birth', 'dob', '生日'])) || '', 
                                    isClient: 'already', 
                                    clientSinceDate: '', 
                                    policies: JSON.parse(JSON.stringify(initialFormState.policies)), 
                                    policyDetails: {}, 
                                    remarks: '', 
                                    _modified: true,
                                    _isNew: true
                                };
                            } else {
                                clientData._modified = true; 
                                clientData.isClient = 'already'; 
                            }
                            
                            const planStr = getVal(row, ['保障名稱', 'plan', 'policy', '保障', '計劃名稱', '產品名稱']); 
                            let matchedPolicyName = null;
                            let matchedCategory = null;

                            if (planStr) { 
                                const cleanPlanStr = String(planStr).toLowerCase().replace(/[\s\(\)（）]/g, '');
                                // 【優化】直接將輸入的 "mpf" 或 "強積金" 配對，避免被 substring 規則錯誤分配
                                if (cleanPlanStr === 'mpf' || cleanPlanStr === '強積金') {
                                    matchedPolicyName = '強積金 (MPF)';
                                    matchedCategory = 'mpf';
                                } else {
                                    Object.keys(POLICY_OPTIONS).forEach(cat => { 
                                        POLICY_OPTIONS[cat].options.forEach(opt => { 
                                            const cleanOpt = opt.toLowerCase().replace(/[\s\(\)（）]/g, '');
                                            if (cleanPlanStr.includes(cleanOpt) || cleanOpt.includes(cleanPlanStr)) { 
                                                if (opt === '危疾應援保(升級版)' && matchedPolicyName === '危疾應援保') { matchedPolicyName = opt; matchedCategory = cat; }
                                                else if (opt === '危疾緻尚保(升級版)' && matchedPolicyName === '危疾緻尚保') { matchedPolicyName = opt; matchedCategory = cat; }
                                                else if (!matchedPolicyName || cleanOpt.length > matchedPolicyName.length) {
                                                    matchedPolicyName = opt;
                                                    matchedCategory = cat;
                                                }
                                            } 
                                        }); 
                                    }); 
                                }
                            }
                            
                            if (matchedPolicyName && matchedCategory) {
                                if (!clientData.policies[matchedCategory].includes(matchedPolicyName)) {
                                    clientData.policies[matchedCategory].push(matchedPolicyName);
                                }

                                if (!clientData.policyDetails) clientData.policyDetails = {};
                                if (!clientData.policyDetails[matchedPolicyName]) {
                                    clientData.policyDetails[matchedPolicyName] = { premium: '', currency: 'HKD', policyNo: '', effectiveDate: '' };
                                }

                                const existingDetail = clientData.policyDetails[matchedPolicyName];

                                let premiumRaw = getVal(row, ['每期保費', '保費', 'premium', '保單保費', 'amount', '金額', '每月供款', '供款'], ['到期', '日期', 'date', 'due']); 
                                let parsedPremium = premiumRaw !== undefined && premiumRaw !== null && premiumRaw !== '' ? String(premiumRaw).replace(/[^0-9.]/g, '') : existingDetail.premium;
                                
                                let currencyRaw = getVal(row, ['貨幣', 'currency', 'ccy']);
                                let parsedCurrency = currencyRaw ? String(currencyRaw).trim().toUpperCase() : (existingDetail.currency || 'HKD');
                                
                                const policyNo = String(getVal(row, ['policy no', '保單編號', 'policy number', '編號', 'no.', '帳戶號碼', '戶口號碼']) || '').trim() || existingDetail.policyNo; 
                                
                                const policyEffStr = getVal(row, ['保障生效日期', '保單生效日期', '保單生效', 'policy effective', '保單生效日', '生效日期', 'effective date', '整合日期']);
                                const policyEffectiveDate = parseExcelDate(policyEffStr) || existingDetail.effectiveDate; 

                                clientData.policyDetails[matchedPolicyName] = {
                                    premium: parsedPremium,
                                    currency: parsedCurrency,
                                    policyNo: policyNo,
                                    effectiveDate: policyEffectiveDate
                                };

                                if (matchedPolicyName.includes('升級版')) {
                                    const baseName = matchedPolicyName.replace('(升級版)', '');
                                    clientData.policies[matchedCategory] = clientData.policies[matchedCategory].filter(p => p !== baseName);
                                    delete clientData.policyDetails[baseName];
                                }
                            }

                            const clientSinceStr = getVal(row, ['client since', '成為客戶']);
                            const policyEffStrBackup = getVal(row, ['保障生效日期', '保單生效日期', '保單生效', 'policy effective', '保單生效日', '生效日期', 'effective date']);
                            const clientSinceDate = parseExcelDate(clientSinceStr || policyEffStrBackup); 
                            if (clientSinceDate && !clientData.clientSinceDate) clientData.clientSinceDate = clientSinceDate;
                            
                            const bday = parseExcelDate(getVal(row, ['出生日期', 'birth', 'dob', '生日']));
                            if (bday) {
                                clientData.birthday = bday;
                            }
                            
                            const nick = getVal(row, ['nickname', '暱稱']);
                            if (nick && !clientData.nickname) clientData.nickname = nick;

                            validClientsMap.set(clientKey, clientData);
                        }
                        
                        let count = 0;
                        const writePromises = [];
                        
                        for (const [key, data] of validClientsMap.entries()) {
                            if (data._modified) { 
                                const payload = { 
                                    name: data.name, 
                                    phone: data.phone, 
                                    nickname: data.nickname || '', 
                                    birthday: data.birthday || '', 
                                    isClient: data.isClient || 'already', 
                                    clientSinceDate: data.clientSinceDate || '', 
                                    policies: data.policies, 
                                    policyDetails: data.policyDetails, 
                                    remarks: data.remarks || '', 
                                    updatedAt: now 
                                };
                                
                                if (data._isNew) {
                                    payload.createdAt = now;
                                    writePromises.push(db.add(payload));
                                } else {
                                    writePromises.push(db.doc(data.id).update(payload));
                                }
                                count++;
                            }
                        }

                        await Promise.all(writePromises);
                        addToast(`匯入完成！更新/新增 ${count} 筆。 (已自動刪除 ${deletedDups} 筆歷史重複紀錄)`);
                    } catch (err) { 
                        console.error(err); 
                        addToast("匯入失敗: " + err.message, 'error'); 
                    } finally { 
                        setLoading(false); 
                        e.target.value = ''; 
                    }
                }; 
                reader.readAsArrayBuffer(file);
            };
            
            const exportToCSV = () => {
                let csv = "姓名,電話,生日,來源,狀態,成為客戶日期,保單內容\n"; 
                filteredClients.forEach(c => { 
                    let polStr = ""; 
                    if (c.isClient === 'already') { 
                        Object.keys(POLICY_OPTIONS).forEach(cat => { 
                            (c.policies[cat]||[]).forEach(p => { 
                                const d = c.policyDetails[p] || {}; 
                                polStr += `${p}[${d.currency||''}$${d.premium||'-'} #${d.policyNo||''} ${d.effectiveDate ? '生效:'+d.effectiveDate : ''}] | `; 
                            }); 
                        }); 
                    } 
                    csv += `${c.name},'${c.phone},${c.birthday},${c.source},${c.isClient},${c.clientSinceDate},${polStr}\n`; 
                });
                const link = document.createElement("a"); link.href = encodeURI("data:text/csv;charset=utf-8,\uFEFF"+csv); link.download = `Felix_DB_${new Date().toISOString().slice(0,10)}.csv`; document.body.appendChild(link); link.click();
            };

            const getSourceColor = (src) => { if (src === '朋友介紹') return 'bg-blue-100 text-blue-700 border-blue-200 dark:bg-blue-900/30 dark:text-blue-300 dark:border-blue-800'; if (src === 'Bigboss') return 'bg-purple-100 text-purple-700 border-purple-200 dark:bg-purple-900/30 dark:text-purple-300 dark:border-purple-800'; if (src === '自己朋友') return 'bg-amber-100 text-amber-700 border-amber-200 dark:bg-amber-900/30 dark:text-amber-300 dark:border-amber-800'; return 'bg-slate-100 text-slate-600 border-slate-200 dark:bg-slate-700 dark:text-slate-300 dark:border-slate-600'; };
            const formatDate = (ts) => { if (!ts) return '-'; try { const d = ts.toDate ? ts.toDate() : (ts instanceof Date ? ts : new Date(ts)); if (isNaN(d.getTime())) return '-'; return d.toLocaleDateString('zh-HK'); } catch(e) { return '-'; } };

            // --- Sidebar ---
            const Sidebar = () => (
                <div className="hidden md:flex flex-col w-64 h-screen fixed left-0 top-0 bg-slate-900 text-white p-4 z-50 shadow-xl">
                    <div className="flex items-center gap-3 mb-8 px-2">
                        <div className="p-1.5 bg-slate-800 rounded-lg border border-slate-700"><Icon name="dashboard" className="text-emerald-400" /></div>
                        <div><h1 className="font-bold text-lg tracking-wide leading-none">Felix DB</h1><p className="text-[10px] text-slate-400 uppercase mt-0.5">V50.0 MPF Pro</p></div>
                    </div>
                    <nav className="flex-1 space-y-2">
                        {[ { id: 'database', label: '客戶列表', icon: 'list' }, { id: 'entry', label: '新增客戶', icon: 'plus' }, { id: 'analytics', label: '數據概覽', icon: 'chart' }, { id: 'claims_dashboard', label: '索償中心', icon: 'activity' } ].map(item => ( <button key={item.id} onClick={() => setCurrentView(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all ${currentView === item.id ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}> <Icon name={item.icon} size={20} /> {item.label} </button> ))}
                    </nav>
                    <div className="pt-4 border-t border-slate-800"><button onClick={() => setDarkMode(!darkMode)} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><Icon name="sun" size={20} />{darkMode ? '淺色模式' : '深色模式'}</button></div>
                </div>
            );

            // --- Views ---
            return (
                <div className="md:pl-64 transition-all duration-300">
                    <ToastContainer toasts={toasts} removeToast={(id) => setToasts(prev => prev.filter(t => t.id !== id))} />
                    <Modal {...modalConfig} />
                    <ClaimsManager isOpen={claimsModalData.isOpen} client={claimsModalData.client} onClose={() => setClaimsModalData({isOpen: false, client: null})} onUpdate={handleUpdateClient} showConfirm={showConfirm} addToast={addToast} />
                    <Sidebar />
                    <BottomNav currentView={currentView} setView={setCurrentView} />

                    <header className="md:hidden bg-white dark:bg-slate-900 border-b dark:border-slate-800 p-4 sticky top-0 z-30 flex justify-between items-center shadow-sm">
                        <h1 className="font-bold text-lg dark:text-white">Felix DB</h1>
                        <button onClick={() => setDarkMode(!darkMode)} className="p-2 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-600 dark:text-slate-300"><Icon name={darkMode?'sun':'moon'} size={18}/></button>
                    </header>

                    <main className="p-4 md:p-8 pb-24 md:pb-8 max-w-7xl mx-auto">
                        
                        {currentView === 'analytics' && (
                            <div className="space-y-6 animate-fadeIn">
                                <h2 className="text-2xl font-bold text-slate-800 dark:text-white mb-6">數據概覽</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-white dark:bg-slate-800 p-5 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm"><div className="text-sm text-slate-500 dark:text-slate-400 mb-1">活躍客戶</div><div className="text-3xl font-bold text-slate-800 dark:text-white">{clients.filter(c=>c.isClient==='already').length}</div></div>
                                    <div className="bg-white dark:bg-slate-800 p-5 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm"><div className="text-sm text-slate-500 dark:text-slate-400 mb-1">總索償額</div><div className="text-3xl font-bold text-emerald-600 dark:text-emerald-400">${analyticsData.totalClaims}</div></div>
                                    <div className="bg-white dark:bg-slate-800 p-5 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm"><div className="text-sm text-slate-500 dark:text-slate-400 mb-1">潛在客戶</div><div className="text-3xl font-bold text-amber-500 dark:text-amber-400">{clients.filter(c=>c.isClient!=='already').length}</div></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm"><h3 className="font-bold text-slate-800 dark:text-white mb-4">保單分佈</h3><div className="flex justify-center py-4"><SimplePieChart data={analyticsData.pieData} /></div></div>
                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm"><h3 className="font-bold text-slate-800 dark:text-white mb-4">每月新增客戶</h3><SimpleBarChart data={analyticsData.barData} /></div>
                                </div>
                            </div>
                        )}

                        {currentView === 'entry' && (
                            <form onSubmit={e => { e.preventDefault(); }} className="animate-slideIn max-w-2xl mx-auto flex flex-col h-full">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold text-slate-800 dark:text-white flex items-center"><span className={`w-2 h-6 mr-3 rounded-full ${editingId ? 'bg-amber-500' : 'bg-slate-800 dark:bg-indigo-500'}`}></span>{editingId ? '編輯客戶' : '新增客戶'}</h2>
                                    {editingId && <button type="button" onClick={() => { handleCancelEdit(); setCurrentView('database'); }} className="text-xs bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 px-3 py-1.5 rounded shadow-sm hover:bg-slate-50 dark:hover:bg-slate-600 text-slate-800 dark:text-white">取消</button>}
                                </div>
                                <div className="flex mb-6 bg-slate-100 dark:bg-slate-800 p-1 rounded-full">
                                    {[1, 2, 3].map(s => <div key={s} onClick={() => setFormStep(s)} className={`flex-1 text-center py-2 text-xs font-bold rounded-full transition-all cursor-pointer ${formStep === s ? 'bg-white dark:bg-slate-600 shadow text-indigo-600 dark:text-indigo-300' : 'text-slate-400'}`}>{s === 1 ? '基本' : s === 2 ? '保單' : '備註'}</div>)}
                                </div>
                                <div className="flex-1 space-y-6">
                                    {formStep === 1 && (
                                        <div className="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 animate-slideIn">
                                            <div className="section-title">基本資訊</div>
                                            <div className="grid grid-cols-1 gap-5 mb-5">
                                                <div className="grid grid-cols-2 gap-3">
                                                    <div>
                                                        <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">客戶姓名</label>
                                                        <input name="name" value={formData.name} onChange={e => setFormData({ ...formData, [e.target.name]: e.target.value })} className="w-full border border-slate-300 dark:border-slate-600 rounded-lg p-3 bg-slate-50 dark:bg-slate-900 dark:text-white" required />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">暱稱</label>
                                                        <input name="nickname" value={formData.nickname} onChange={e => setFormData({ ...formData, [e.target.name]: e.target.value })} className="w-full border border-slate-300 dark:border-slate-600 rounded-lg p-3 bg-slate-50 dark:bg-slate-900 dark:text-white" placeholder="選填" />
                                                    </div>
                                                </div>
                                                <div><label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">電話號碼</label><input name="phone" type="tel" value={formData.phone} onChange={e => setFormData({ ...formData, [e.target.name]: e.target.value })} className="w-full border border-slate-300 dark:border-slate-600 rounded-lg p-3 bg-slate-50 dark:bg-slate-900 dark:text-white" required /></div>
                                                <div><label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">生日</label><input type="date" name="birthday" value={formData.birthday} onChange={e => setFormData({ ...formData, [e.target.name]: e.target.value })} className="w-full border border-slate-300 dark:border-slate-600 rounded-lg p-3 bg-slate-50 dark:bg-slate-900 dark:text-white" /></div>
                                            </div>
                                            <div className="bg-slate-50 dark:bg-slate-900 p-4 rounded-lg border border-slate-200 dark:border-slate-700">
                                                <label className="block text-xs font-bold text-slate-500 mb-2">來源</label>
                                                <select name="source" value={formData.source} onChange={e => setFormData({ ...formData, [e.target.name]: e.target.value })} className="w-full border border-slate-300 dark:border-slate-600 rounded-lg p-3 bg-white dark:bg-slate-800 dark:text-white mb-3">
                                                    {SOURCE_OPTIONS.map(o=><option key={o}>{o}</option>)}
                                                </select>
                                                {(formData.source === '朋友介紹' || formData.source === '其他') && (<input name="referrerName" value={formData.referrerName} onChange={e => setFormData({ ...formData, [e.target.name]: e.target.value })} className="w-full border border-indigo-200 dark:border-indigo-800 rounded-lg p-3 bg-indigo-50 dark:bg-slate-800 dark:text-white" placeholder="介紹人姓名 / 來源註明" />)}
                                            </div>
                                        </div>
                                    )}
                                    {formStep === 2 && (
                                        <div className="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 animate-slideIn">
                                            <div className="section-title">狀態與保單</div>
                                            <div className="mb-6 flex bg-slate-100 dark:bg-slate-700 p-1 rounded-lg">
                                                {[{l:'潛在客戶',v:'not_yet'},{l:'已成交',v:'already'}].map(o => <button key={o.v} type="button" onClick={()=>setFormData({...formData, isClient: o.v})} className={`flex-1 py-2 text-sm font-bold rounded-md transition-all ${formData.isClient === o.v ? 'bg-white dark:bg-slate-600 shadow text-slate-800 dark:text-white' : 'text-slate-400'}`}>{o.l}</button>)}
                                            </div>
                                            {formData.isClient === 'already' ? (
                                                <div className="space-y-4">
                                                    <div><label className="block text-xs font-bold text-slate-500 mb-1.5">成交日期</label><input type="date" name="clientSinceDate" value={formData.clientSinceDate} onChange={e => setFormData({ ...formData, [e.target.name]: e.target.value })} className="w-full border border-slate-300 dark:border-slate-600 rounded-lg p-2.5 bg-white dark:bg-slate-900 dark:text-white" /></div>
                                                    {Object.keys(POLICY_OPTIONS).map(k => (
                                                        <div key={k} className="bg-slate-50 dark:bg-slate-900 p-3 rounded-lg border border-slate-100 dark:border-slate-700">
                                                            <p className="text-xs font-bold text-slate-800 dark:text-white mb-2">{POLICY_OPTIONS[k].label}</p>
                                                            <div className="space-y-2">
                                                                {POLICY_OPTIONS[k].options.map(o=>(
                                                                    <div key={o}>
                                                                        <label className={`flex items-start p-2 rounded border cursor-pointer transition-all ${formData.policies[k].includes(o) ? 'bg-indigo-50 border-indigo-200 text-indigo-700 dark:bg-indigo-900/30 dark:border-indigo-800 dark:text-indigo-300' : 'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-600 dark:text-slate-300'}`}>
                                                                            <input type="checkbox" checked={formData.policies[k].includes(o)} onChange={()=>{ const arr = formData.policies[k].includes(o) ? formData.policies[k].filter(i=>i!==o) : [...formData.policies[k], o]; setFormData({...formData, policies: {...formData.policies, [k]: arr}}); }} className="mt-1 mr-2"/>
                                                                            <span className="text-sm font-medium">{o}</span>
                                                                        </label>
                                                                        {/* 【優化】加入 k 類別傳遞，用以判定是否顯示 MPF 專屬文字 */}
                                                                        {formData.policies[k].includes(o) && renderPolicyInputs(o, k)}
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="animate-slideIn"><label className="block text-sm font-bold text-amber-600 dark:text-amber-400 mb-1.5">預約見面日期</label><input type="date" name="appointmentDate" value={formData.appointmentDate} onChange={e => setFormData({ ...formData, [e.target.name]: e.target.value })} className="w-full border border-amber-200 dark:border-amber-800 rounded-lg p-2.5 bg-amber-50 dark:bg-slate-900 dark:text-white" /></div>
                                            )}
                                        </div>
                                    )}
                                    {formStep === 3 && (
                                        <div className="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 animate-slideIn">
                                            <div className="section-title">詳細背景</div>
                                            <div className="grid grid-cols-2 gap-5 mb-5">
                                                <div><label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">職業</label><input name="occupation" value={formData.occupation} onChange={e => setFormData({ ...formData, [e.target.name]: e.target.value })} className="w-full border border-slate-300 dark:border-slate-600 rounded-lg p-2.5 bg-slate-50 dark:bg-slate-900 dark:text-white" /></div>
                                                <div><label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">收入</label><select name="income" value={formData.income} onChange={e => setFormData({ ...formData, [e.target.name]: e.target.value })} className="w-full border border-slate-300 dark:border-slate-600 rounded-lg p-2.5 bg-slate-50 dark:bg-slate-900 dark:text-white"><option value="">選擇...</option>{INCOME_OPTIONS.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
                                            </div>
                                            <div className="mb-5"><label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">病歷資料 (重點)</label><textarea name="medicalHistory" value={formData.medicalHistory} onChange={e => setFormData({ ...formData, [e.target.name]: e.target.value })} className="w-full border border-red-200 dark:border-red-900 rounded-lg p-3 bg-red-50 dark:bg-slate-900 dark:text-white h-24 text-sm" placeholder="如：高血壓、手術紀錄..."></textarea></div>
                                            <div className="mb-5"><label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">一般備註</label><textarea name="remarks" value={formData.remarks} onChange={e => setFormData({ ...formData, [e.target.name]: e.target.value })} className="w-full border border-slate-300 dark:border-slate-600 rounded-lg p-3 bg-slate-50 dark:bg-slate-900 dark:text-white h-24 text-sm"></textarea></div>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="mt-6 flex flex-col gap-3">
                                    <div className="flex gap-3">
                                        {formStep > 1 && <button type="button" onClick={() => setFormStep(s=>s-1)} className="flex-1 py-3.5 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-white font-bold rounded-xl">上一步</button>}
                                        {formStep < 3 && <button type="button" onClick={() => setFormStep(s=>s+1)} className="flex-1 py-3.5 bg-slate-800 dark:bg-indigo-600 text-white font-bold rounded-xl shadow-lg">下一步</button>}
                                    </div>
                                    
                                    {formStep === 3 && (
                                        <button type="button" onClick={handleSubmit} disabled={!isSubmitReady} className={`w-full py-4 mt-2 text-white font-bold rounded-xl shadow-lg flex items-center justify-center animate-slideUp ${editingId ? 'bg-amber-500 hover:bg-amber-600' : 'bg-emerald-600 hover:bg-emerald-700'}`}>
                                            <Icon name="save" className="mr-2"/> {editingId ? '更新客戶資料' : '✅ 確認儲存所有資料'}
                                        </button>
                                    )}
                                </div>
                            </form>
                        )}

                        {(currentView === 'database' || currentView === 'claims_dashboard') && (
                            <div className="space-y-6">
                                <div className="bg-white dark:bg-slate-800 p-5 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 space-y-4 sticky top-4 z-20">
                                    {currentView === 'database' ? (
                                        <>
                                            <div className="flex flex-col md:flex-row gap-2">
                                                <div className="relative flex-1"><div className="absolute left-3 top-3 text-slate-400"><Icon name="search"/></div><input placeholder="搜尋姓名、電話..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full border border-slate-200 dark:border-slate-700 rounded-lg pl-10 p-2.5 bg-slate-50 dark:bg-slate-900 dark:text-white outline-none" /></div>
                                                <div className="flex gap-2">
                                                    <select value={sortOrder} onChange={(e)=>setSortOrder(e.target.value)} className="text-xs border rounded p-2 bg-slate-50 dark:bg-slate-900 dark:text-white"><option value="updated_desc">最近更新</option><option value="since_desc">成為客戶(新-舊)</option><option value="since_asc">成為客戶(舊-新)</option></select>
                                                    <button onClick={exportToCSV} className="p-2 bg-slate-100 dark:bg-slate-700 rounded"><Icon name="download" /></button>
                                                    <button onClick={()=>fileInputRef.current.click()} className="p-2 bg-slate-100 dark:bg-slate-700 rounded text-emerald-600"><Icon name="upload" /></button>
                                                    <input type="file" ref={fileInputRef} onChange={handleImport} className="hidden" accept=".xlsx,.xls"/>
                                                </div>
                                            </div>
                                            <div className="flex gap-2 overflow-x-auto custom-scrollbar pb-2">
                                                {[{l:'全部',v:'all',c:counts.all},{l:'已成交',v:'already',c:counts.already},{l:'潛在',v:'not_yet',c:counts.not_yet}].map(o => <button key={o.v} onClick={()=>setActiveFilters({...activeFilters, status: o.v})} className={`whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-bold border transition-colors ${activeFilters.status === o.v ? 'bg-slate-800 text-white dark:bg-white dark:text-slate-900' : 'bg-white text-slate-600 dark:bg-slate-900 dark:text-slate-400 dark:border-slate-700'}`}>{o.l} <span className="ml-1 opacity-60 text-[10px]">({o.c})</span></button>)}
                                                <div className="w-px bg-slate-200 dark:bg-slate-700 mx-1"></div>
                                                <button onClick={()=>togglePolicyFilter('all')} className={`whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-bold border ${activeFilters.policies.length===0?'bg-indigo-600 text-white border-indigo-600':'bg-white text-indigo-600 dark:bg-slate-900 dark:text-indigo-400 dark:border-indigo-900'}`}>所有保單 <span className="ml-1 opacity-60 text-[10px]">({counts.anyPolicy})</span></button>
                                                {Object.keys(POLICY_OPTIONS).map(k=><button key={k} onClick={()=>togglePolicyFilter(k)} className={`whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-bold border ${activeFilters.policies.includes(k)?'bg-indigo-600 text-white':'bg-white text-indigo-600 dark:bg-slate-900 dark:text-indigo-400 dark:border-indigo-900'}`}>{POLICY_OPTIONS[k].label.split('. ')[1]} <span className="ml-1 opacity-60 text-[10px]">({counts[k]})</span></button>)}
                                            </div>
                                            <div className="flex gap-2 overflow-x-auto custom-scrollbar pb-2 border-t pt-2 dark:border-slate-700">
                                                <span className="text-xs text-slate-400 py-1">來源:</span>
                                                <button onClick={()=>setActiveFilters({...activeFilters, source:'all'})} className={`whitespace-nowrap px-2 py-1 rounded text-xs font-bold ${activeFilters.source==='all'?'bg-slate-200 dark:bg-slate-700':'text-slate-500'}`}>全部 <span className="ml-0.5 opacity-60 text-[9px]">({counts.all})</span></button>
                                                {SOURCE_OPTIONS.map(s=><button key={s} onClick={()=>setActiveFilters({...activeFilters, source:s})} className={`whitespace-nowrap px-2 py-1 rounded text-xs font-bold ${activeFilters.source===s?'bg-slate-200 dark:bg-slate-700':'text-slate-500'}`}>{s} <span className="ml-0.5 opacity-60 text-[9px]">({counts.source[s]})</span></button>)}
                                            </div>
                                        </>
                                    ) : (
                                        <div className="space-y-3">
                                            <h2 className="text-lg font-bold text-slate-800 dark:text-white flex items-center"><Icon name="activity" className="mr-2 text-indigo-500"/>全域索償中心</h2>
                                            <div className="relative"><div className="absolute left-3 top-3 text-slate-400"><Icon name="search"/></div><input placeholder="搜尋案件..." value={claimsSearch} onChange={e=>setClaimsSearch(e.target.value)} className="w-full border border-slate-200 dark:border-slate-700 rounded-lg pl-10 p-2.5 bg-slate-50 dark:bg-slate-900 dark:text-white outline-none" /></div>
                                            <div className="flex bg-slate-100 dark:bg-slate-700 p-1 rounded-lg">
                                                {[{l:'處理中',v:'processing',c:'text-amber-600 dark:text-amber-400'},{l:'已完成',v:'completed',c:'text-emerald-600 dark:text-emerald-400'}].map(o => <button key={o.v} onClick={()=>setClaimsFilter(o.v)} className={`flex-1 py-2 text-xs font-bold rounded-md ${claimsFilter===o.v?'bg-white dark:bg-slate-600 shadow '+o.c:'text-slate-400'}`}>{o.l} ({allClaims.filter(c=>c.status===o.v).length})</button>)}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {currentView === 'database' && clients.length > 0 && (
                                    (() => {
                                        const today = new Date(); today.setHours(0,0,0,0);
                                        const upcoming = clients.filter(c => {
                                            if(!c.birthday) return false;
                                            const bDate = new Date(c.birthday);
                                            const thisYearBday = new Date(today.getFullYear(), bDate.getMonth(), bDate.getDate());
                                            if (thisYearBday < today) thisYearBday.setFullYear(today.getFullYear() + 1);
                                            const diffDays = Math.ceil((thisYearBday - today) / (1000 * 60 * 60 * 24));
                                            return diffDays >= 0 && diffDays <= 7;
                                        }).map(c => {
                                             const bDate = new Date(c.birthday);
                                             const thisYearBday = new Date(today.getFullYear(), bDate.getMonth(), bDate.getDate());
                                             if (thisYearBday < today) thisYearBday.setFullYear(today.getFullYear() + 1);
                                             return {...c, daysUntil: Math.ceil((thisYearBday - today) / (1000 * 60 * 60 * 24))};
                                        });

                                        if(upcoming.length === 0) return null;
                                        return (
                                            <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-pink-100 dark:border-pink-900/30 overflow-hidden animate-slideIn">
                                                <div className="bg-gradient-to-r from-pink-50 to-white dark:from-pink-900/20 dark:to-slate-800 px-4 py-3 border-b border-pink-100 dark:border-pink-900/30 flex items-center"><Icon name="gift" className="text-pink-500 mr-2"/><h3 className="font-bold text-slate-800 dark:text-pink-200 text-sm">近期生日</h3></div>
                                                <div className="p-4 flex gap-3 overflow-x-auto custom-scrollbar">
                                                    {upcoming.map(c => (
                                                        <div key={c.id} className="min-w-[160px] bg-pink-50/50 dark:bg-slate-900 border border-pink-100 dark:border-pink-900/30 rounded-lg p-3 flex flex-col">
                                                            <div className="font-bold text-slate-700 dark:text-pink-100">{c.name}</div>
                                                            <div className="text-[10px] text-slate-500 dark:text-slate-400 mb-1">{c.phone}</div>
                                                            <div className="text-xs text-pink-500 font-bold mb-2 flex items-center">{c.daysUntil === 0 ? '🎂 今日生日!' : `${c.daysUntil}天後`}</div>
                                                            <a href={`https://wa.me/852${c.phone}`} target="_blank" className="mt-auto bg-[#25D366] hover:bg-[#128C7E] text-white text-[10px] font-bold py-1.5 rounded flex items-center justify-center"><Icon name="message" size={12} className="mr-1"/> WhatsApp</a>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })()
                                )}

                                <div className="space-y-4">
                                    {loading ? ( [1,2,3].map(i => <SkeletonCard key={i}/>) ) : currentView === 'database' ? (
                                        filteredClients.length === 0 ? <div className="text-center text-slate-400 dark:text-slate-600 py-12">沒有資料</div> : 
                                        filteredClients.map(c => (
                                            <div key={c.id} className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden hover:border-indigo-300 dark:hover:border-indigo-700 transition-colors animate-fadeIn cursor-pointer" onClick={() => handleEdit(c)}>
                                                <div className="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-start">
                                                    <div>
                                                        <div className="flex flex-wrap items-baseline gap-2 mb-1">
                                                            <h3 className="font-bold text-lg text-slate-800 dark:text-white">
                                                                {c.nickname || c.name} 
                                                                <span className="text-sm font-normal text-slate-400 dark:text-slate-500 ml-1">({c.name})</span>
                                                            </h3>
                                                            {c.birthday && (
                                                                <span className="text-[10px] text-slate-500 bg-slate-100 dark:bg-slate-700 dark:text-slate-400 px-1.5 py-0.5 rounded border border-slate-200 dark:border-slate-600">
                                                                    🎂 {c.birthday} ({calculateAge(c.birthday)}歲)
                                                                </span>
                                                            )}
                                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border uppercase ${c.isClient==='already' ? 'bg-emerald-50 text-emerald-700 border-emerald-100 dark:bg-emerald-900/30 dark:text-emerald-300 dark:border-emerald-800' : 'bg-slate-100 text-slate-600 border-slate-200 dark:bg-slate-700 dark:text-slate-300 dark:border-slate-600'}`}>{c.isClient==='already' ? '已成交' : '潛在'}</span>
                                                        </div>
                                                        <div className="text-sm text-slate-500 dark:text-slate-400 flex flex-wrap gap-x-4 gap-y-1 items-center mt-1">
                                                            <div className="flex items-center font-mono">
                                                                <Icon name="phone" size={12} className="mr-1.5 opacity-70" />{c.phone}
                                                            </div>
                                                            {c.occupation && (
                                                                <div className="flex items-center">
                                                                    <Icon name="briefcase" size={12} className="mr-1.5 opacity-70" />{c.occupation}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col items-end gap-1">
                                                        <div className="flex items-center gap-1.5">
                                                            <span className={`text-[10px] px-2 py-1 rounded border ${getSourceColor(c.source)}`}>{c.source}</span>
                                                            <button onClick={(e) => { e.stopPropagation(); handleDelete(c.id); }} className="p-1 text-slate-400 hover:text-red-500 transition-colors" title="刪除此客戶">
                                                                <Icon name="trash" size={14}/>
                                                            </button>
                                                        </div>
                                                        {c.isClient === 'already' && <button onClick={(e) => { e.stopPropagation(); setClaimsModalData({isOpen: true, client: c}); }} className="p-1.5 bg-purple-50 text-purple-600 dark:bg-purple-900/30 dark:text-purple-300 rounded hover:bg-purple-100 mt-1"><Icon name="activity" size={14} /></button>}
                                                    </div>
                                                </div>
                                                <div className="p-4 pt-3">
                                                    {c.isClient === 'already' && (
                                                        <div className="flex flex-col gap-1.5 mb-3">
                                                            {[...(c.policies.criticalIllness||[]), ...(c.policies.vhis||[]), ...(c.policies.saving||[]), ...(c.policies.accident||[]), ...(c.policies.annuity||[]), ...(c.policies.mpf||[])].filter(Boolean).map(p => {
                                                                const d = c.policyDetails[p] || {};
                                                                return (
                                                                    <div key={p} className="text-xs bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-300 px-3 py-2 rounded-lg border border-indigo-100 dark:border-indigo-800 flex flex-col sm:flex-row justify-between sm:items-center gap-2">
                                                                        <span className="font-bold">{p}</span>
                                                                        <div className="flex items-center gap-2 flex-wrap justify-end">
                                                                            {d.effectiveDate && <span className="text-emerald-700 bg-emerald-50 dark:bg-emerald-900/40 dark:text-emerald-300 px-1.5 py-0.5 rounded text-[10px] flex items-center border border-emerald-200 dark:border-emerald-800/50"><Icon name="calendar" size={10} className="mr-1"/>{d.effectiveDate} 生效</span>}
                                                                            <span className="opacity-90">{d.currency} ${d.premium}</span>
                                                                            {d.policyNo && <span className="font-mono text-[10px] bg-white dark:bg-slate-800 px-1.5 py-0.5 rounded text-slate-500 border border-slate-200 dark:border-slate-700">#{d.policyNo}</span>}
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    )}
                                                    
                                                    {c.medicalHistory && (
                                                        <div className="mt-2 text-xs bg-red-50 text-red-800 dark:bg-red-900/30 dark:text-red-200 p-2 rounded border border-red-100 dark:border-red-800 flex items-start">
                                                            <span className="mr-2 text-base">⚠️</span>
                                                            <span className="pt-0.5">{c.medicalHistory}</span>
                                                        </div>
                                                    )}

                                                    {c.remarks && (
                                                        <div className="mt-2 text-xs bg-amber-50 text-amber-800 dark:bg-amber-900/30 dark:text-amber-200 p-2 rounded border border-amber-100 dark:border-amber-800 flex items-start">
                                                            <span className="mr-2 text-base">📝</span>
                                                            <span className="pt-0.5">{c.remarks}</span>
                                                        </div>
                                                    )}

                                                    <div className="text-[10px] text-slate-300 dark:text-slate-600 mt-2 text-right">更新: {formatDate(c.updatedAt)}</div>
                                                </div>
                                            </div>
                                        ))
                                    ) : (
                                        filteredDashboardClaims.length === 0 ? <div className="text-center text-slate-400 dark:text-slate-600 py-12">沒有索償紀錄</div> :
                                        filteredDashboardClaims.map((claim, idx) => (
                                            <div key={idx} onClick={() => { const client = clients.find(c => c.id === claim.clientId); if(client) setClaimsModalData({isOpen: true, client}); }} className="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm transition-transform cursor-pointer hover:border-indigo-200 relative group">
                                                <div className="flex justify-between items-start mb-2">
                                                    <div className="flex items-center gap-2"><span className={`text-[10px] font-bold px-2 py-0.5 rounded border uppercase ${claim.type === 'accident' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-blue-50 text-blue-600 border-blue-100'}`}>{claim.type === 'accident' ? '意外' : '醫療'}</span><span className="text-xs font-bold text-slate-500 dark:text-slate-400">{claim.clientName}</span></div>
                                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${claim.status === 'processing' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}`}>{claim.status === 'processing' ? '處理中' : '已成功'}</span>
                                                </div>
                                                <h3 className="font-bold text-slate-800 dark:text-white mb-1">{claim.title}</h3>
                                                <div className="text-xs text-slate-500 dark:text-slate-400 mb-3">發生日期: {claim.incidentDate}</div>
                                                
                                                <div className="flex justify-between items-end border-t border-slate-100 dark:border-slate-700 pt-3">
                                                    <div className="text-xs text-slate-400">{claim.recordsCount} 筆紀錄</div>
                                                    <div className="text-right">
                                                        <div className="text-[10px] text-slate-500 dark:text-slate-400 mb-0.5">累積總額: ${claim.totalAmount}</div>
                                                        <div className="text-sm font-bold text-emerald-600 dark:text-emerald-400">已批核: ${claim.claimedAmount}</div>
                                                    </div>
                                                </div>
                                                
                                                <button onClick={(e)=>handleQuickDeleteClaim(e, claim.clientId, claim.id)} className="absolute top-2 right-2 p-2 text-slate-300 hover:text-red-500"><Icon name="trash" size={14}/></button>
                                                <button onClick={(e)=>handleQuickStatusToggle(e, claim.clientId, claim.id, claim.status)} className="absolute bottom-4 left-4 text-xs font-bold px-3 py-1.5 rounded border bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600 shadow-sm">{claim.status==='processing'?'✅ 完成結案':'↩️ 重新開啟'}</button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const App = () => (<div className="min-h-screen"><GlobalErrorBoundary><MainContent /></GlobalErrorBoundary></div>);
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
